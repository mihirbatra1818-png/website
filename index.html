<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Study Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #07101f;
    color: #f0ead8;
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #sky {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    background: #07101f;
  }

  #lightning-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  header {
    text-align: center;
    padding: 48px 0 24px;
    border-bottom: 1px solid rgba(160,210,255,0.35);
    margin-bottom: 24px;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(26px, 5vw, 48px);
    color: #a0d2ff;
    letter-spacing: 3px;
    line-height: 1.2;
    text-shadow: 0 0 40px rgba(160,210,255,0.3);
  }

  header p {
    color: #d0c8b8;
    font-size: 17px;
    margin-top: 8px;
    font-style: italic;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin: 18px 0 0;
    font-family: 'Cinzel', serif;
    font-size: 13px;
  }

  .stat {
    background: rgba(160,210,255,0.12);
    border: 1px solid rgba(160,210,255,0.35);
    border-radius: 8px;
    padding: 9px 18px;
    color: #d0eaff;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }

  .tab {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(160,210,255,0.25);
    color: #c8bda8;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .tab:hover {
    background: rgba(160,210,255,0.14);
    color: #a0d2ff;
    border-color: rgba(160,210,255,0.45);
  }

  .tab.active {
    background: rgba(160,210,255,0.22);
    border-color: #a0d2ff;
    color: #fff;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: #a0d2ff;
    margin-bottom: 20px;
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(160,210,255,0.25);
  }

  /* ---- FLASHCARDS ---- */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .card {
    background: rgba(18, 36, 68, 0.97);
    border: 1px solid rgba(160,210,255,0.35);
    border-radius: 10px;
    padding: 22px 18px;
    cursor: pointer;
    transition: all 0.3s;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .card:hover {
    border-color: rgba(160,210,255,0.65);
    transform: translateY(-3px);
    background: rgba(22, 44, 80, 0.99);
  }

  .card .term {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: #a0d2ff;
    font-weight: 700;
  }

  .card .answer {
    font-size: 14px;
    color: #f0e8d4;
    line-height: 1.6;
    display: none;
  }

  .card.flipped .term { display: none; }
  .card.flipped .answer { display: block; }
  .card.flipped { background: rgba(10, 44, 20, 0.97); border-color: rgba(80,200,100,0.5); }
  .card-hint { font-size: 11px; color: rgba(200,189,168,0.5); margin-top: 12px; font-style: italic; }

  /* ---- QUIZ ---- */
  .quiz-box {
    background: rgba(18, 36, 68, 0.97);
    border: 1px solid rgba(160,210,255,0.35);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .quiz-q {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: #f0ead8;
    margin-bottom: 22px;
    line-height: 1.6;
  }

  .quiz-opts { display: flex; flex-direction: column; gap: 10px; }

  .quiz-opt {
    background: rgba(30, 55, 100, 0.85);
    border: 1px solid rgba(160,210,255,0.3);
    border-radius: 9px;
    padding: 13px 18px;
    cursor: pointer;
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    color: #e8e0cc;
    transition: all 0.25s;
    text-align: left;
  }

  .quiz-opt:hover:not(.disabled) {
    background: rgba(50, 90, 160, 0.9);
    border-color: #a0d2ff;
    color: #fff;
  }

  .quiz-opt.correct { background: rgba(15, 65, 25, 0.95); border-color: #66cc77; color: #ccffcc; }
  .quiz-opt.wrong   { background: rgba(70, 15, 15, 0.95); border-color: #cc5555; color: #ffcccc; }
  .quiz-opt.disabled { cursor: default; }

  .quiz-feedback {
    font-size: 15px;
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 9px;
    display: none;
    line-height: 1.65;
    color: #f0e8d4;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb { background: rgba(15,60,25,0.9); border: 1px solid rgba(80,180,100,0.45); color: #b8f0b8; }
  .quiz-feedback.wrong-fb   { background: rgba(60,15,15,0.9); border: 1px solid rgba(200,80,80,0.45); color: #f8d0b0; }

  .next-btn {
    margin-top: 18px;
    background: rgba(160,210,255,0.14);
    border: 1px solid #a0d2ff;
    color: #a0d2ff;
    border-radius: 8px;
    padding: 11px 28px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s;
    display: none;
  }

  .next-btn.show { display: inline-block; }
  .next-btn:hover { background: rgba(160,210,255,0.28); color: #fff; }

  /* ---- LESSONS ---- */
  .lesson {
    background: rgba(18, 36, 68, 0.97);
    border: 1px solid rgba(160,210,255,0.3);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .lesson-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .lesson-header:hover { background: rgba(160,210,255,0.08); }

  .lesson-badge {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: #a0d2ff;
    background: rgba(160,210,255,0.14);
    border: 1px solid rgba(160,210,255,0.35);
    border-radius: 6px;
    padding: 5px 11px;
    white-space: nowrap;
  }

  .lesson-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: #f0ead8;
    margin-left: 16px;
    flex: 1;
    line-height: 1.4;
  }

  .lesson-arrow { color: #a0d2ff; transition: transform 0.3s; font-size: 18px; }
  .lesson.open .lesson-arrow { transform: rotate(180deg); }

  .lesson-body {
    display: none;
    padding: 18px 22px 22px;
    border-top: 1px solid rgba(160,210,255,0.15);
    animation: fadeIn 0.3s ease;
  }

  .lesson.open .lesson-body { display: block; }

  .lesson-body p {
    font-size: 16px;
    color: #e8e0cc;
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .lesson-body h4 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #a0d2ff;
    margin: 16px 0 10px;
  }

  .lesson-body ul { list-style: none; padding: 0; }

  .lesson-body ul li {
    font-size: 15px;
    color: #e8e0cc;
    padding: 6px 0 6px 22px;
    position: relative;
    line-height: 1.6;
  }

  .lesson-body ul li::before {
    content: '⚡';
    position: absolute;
    left: 0;
    font-size: 12px;
  }

  .hl { color: #a0d2ff; font-weight: 600; }

  /* ---- EXPLORE ---- */
  .explore-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 16px;
  }

  .explore-card {
    background: rgba(18, 36, 68, 0.97);
    border: 1px solid rgba(160,210,255,0.3);
    border-radius: 12px;
    padding: 22px;
  }

  .explore-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: #a0d2ff;
    margin-bottom: 12px;
  }

  .explore-card p {
    font-size: 15px;
    color: #e0d8c4;
    line-height: 1.75;
  }

  .table-wrap { overflow-x: auto; margin-top: 8px; }

  table.info-table { width: 100%; border-collapse: collapse; font-size: 14px; }

  table.info-table th {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: #a0d2ff;
    padding: 9px;
    border-bottom: 1px solid rgba(160,210,255,0.3);
    text-align: left;
  }

  table.info-table td {
    padding: 9px;
    color: #e0d8c4;
    border-bottom: 1px solid rgba(160,210,255,0.1);
    vertical-align: top;
  }

  /* ---- MATCH ---- */
  .match-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .match-col { display: flex; flex-direction: column; gap: 8px; }

  .match-col h4 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #a0d2ff;
    margin-bottom: 6px;
    text-align: center;
  }

  .match-item {
    background: rgba(18, 36, 68, 0.97);
    border: 1px solid rgba(160,210,255,0.3);
    border-radius: 9px;
    padding: 12px 14px;
    cursor: pointer;
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    color: #e8e0cc;
    transition: all 0.25s;
    line-height: 1.5;
  }

  .match-item:hover { border-color: rgba(160,210,255,0.6); color: #fff; background: rgba(30,55,100,0.9); }
  .match-item.selected { background: rgba(40,80,160,0.85); border-color: #a0d2ff; color: #fff; }
  .match-item.matched  { background: rgba(12,50,20,0.95); border-color: #66cc77; color: #ccffcc; cursor: default; }

  .match-item.wrong-match {
    background: rgba(70,15,15,0.95);
    border-color: #cc5555;
    animation: shake 0.4s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .match-controls { text-align: center; margin-top: 18px; }

  .match-score {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: #a0d2ff;
    margin-bottom: 12px;
  }

  .reset-btn {
    background: rgba(160,210,255,0.1);
    border: 1px solid rgba(160,210,255,0.35);
    color: #c8bda8;
    border-radius: 8px;
    padding: 9px 22px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: #a0d2ff; color: #a0d2ff; }

  @media (max-width: 540px) {
    .match-area { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="sky">
  <canvas id="lightning-canvas"></canvas>
</div>

<div class="content">
  <header>
    <h1>⛈ Weather Study Quest</h1>
    <p>Science — Conquer the Atmosphere!</p>
    <div class="stats">
      <div class="stat">⚡ Points: <span id="pts">0</span></div>
      <div class="stat">✅ Quiz: <span id="qs">0</span> / <span id="qt">0</span></div>
      <div class="stat">🃏 Flipped: <span id="flips">0</span></div>
    </div>
  </header>

  <nav>
    <button class="tab active" onclick="showTab('flashcards',this)">📖 Flashcards</button>
    <button class="tab" onclick="showTab('quiz',this)">🧠 Quiz</button>
    <button class="tab" onclick="showTab('lessons',this)">🌩 Lessons</button>
    <button class="tab" onclick="showTab('explore',this)">🗺 Explore</button>
    <button class="tab" onclick="showTab('match',this)">🎯 Match It</button>
  </nav>

  <!-- FLASHCARDS -->
  <div class="panel active" id="panel-flashcards">
    <div class="panel-title">📖 Key Terms — Tap to Reveal!</div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <!-- QUIZ -->
  <div class="panel" id="panel-quiz">
    <div class="panel-title">🧠 Weather Knowledge Quiz</div>
    <div id="quiz-container"></div>
  </div>

  <!-- LESSONS -->
  <div class="panel" id="panel-lessons">
    <div class="panel-title">🌩 Lessons — What Causes a Storm?</div>
    <div id="lessons-container"></div>
  </div>

  <!-- EXPLORE -->
  <div class="panel" id="panel-explore">
    <div class="panel-title">🗺 Explore the Atmosphere</div>
    <div class="explore-grid" id="explore-grid"></div>
  </div>

  <!-- MATCH -->
  <div class="panel" id="panel-match">
    <div class="panel-title">🎯 Match the Term to its Definition!</div>
    <div class="match-score" id="match-score">Matched: 0 / 8</div>
    <div class="match-area">
      <div class="match-col">
        <h4>📜 Terms</h4>
        <div id="match-terms"></div>
      </div>
      <div class="match-col">
        <h4>💬 Definitions</h4>
        <div id="match-defs"></div>
      </div>
    </div>
    <div class="match-controls">
      <button class="reset-btn" onclick="initMatch()">🔄 Restart Match</button>
    </div>
  </div>
</div>

<script>
// ---- LIGHTNING ----
const canvas = document.getElementById('lightning-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Stars
const sky = document.getElementById('sky');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.2 + 0.8;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*75}%;left:${Math.random()*100}%;opacity:${0.25+Math.random()*0.75};animation:twinkle ${2+Math.random()*3}s infinite ${Math.random()*3}s;`;
  sky.appendChild(s);
}

const style = document.createElement('style');
style.textContent = '@keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:1;}}';
document.head.appendChild(style);

function drawZigzag(startX, startY, numSegs, spread) {
  const pts = [[startX, startY]];
  let cx = startX, cy = startY;
  const segLen = (canvas.height * 0.4) / numSegs;
  for (let i = 0; i < numSegs; i++) {
    const nx = cx + (Math.random() - 0.5) * spread * 2;
    const ny = cy + segLen + (Math.random() - 0.3) * 12;
    pts.push([nx, ny]);
    cx = nx; cy = ny;
  }
  return pts;
}

function flashLightning(x) {
  const pts = drawZigzag(x, 0, 14, 32);

  function drawBolt(alpha, width) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#c8e8ff';
    ctx.lineWidth = width;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = width * 0.35;
    ctx.stroke();
    ctx.restore();
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBolt(1, 3);
  setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); }, 100);
  setTimeout(() => { drawBolt(0.6, 2); }, 140);
  setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); }, 220);
  setTimeout(() => { drawBolt(0.9, 2.5); }, 260);
  setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); }, 400);
}

function scheduleLightning() {
  const x = canvas.width * (0.1 + Math.random() * 0.8);
  flashLightning(x);
  setTimeout(scheduleLightning, 4500 + Math.random() * 6000);
}
setTimeout(scheduleLightning, 1800);

// ---- SCORING ----
let pts = 0, flips = 0, qs = 0, qt = 0;
function addPts(n)  { pts += n;  document.getElementById('pts').textContent   = pts; }
function addFlip()  { flips++;   document.getElementById('flips').textContent = flips; }
function addQ(c)    { qt++; if(c) qs++; document.getElementById('qs').textContent = qs; document.getElementById('qt').textContent = qt; }

// ---- TABS ----
function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// ---- FLASHCARDS ----
const flashcards = [
  { term: 'Weather',         answer: 'Current atmosphere conditions: temperature, precipitation, humidity, wind, air pressure, and cloud cover.' },
  { term: 'Air Mass',        answer: 'A large body of air with similar temperature and humidity throughout.' },
  { term: 'Thermal Energy',  answer: 'Energy from moving particles — transferred by radiation, conduction, or convection.' },
  { term: 'Radiation',       answer: 'Heat transfer by waves between objects NOT touching (e.g., the sun heating Earth).' },
  { term: 'Conduction',      answer: 'Heat transfer between molecules through direct collision/contact.' },
  { term: 'Convection',      answer: 'Density-driven heat transfer — hot less-dense air rises; cool dense air sinks to replace it.' },
  { term: 'Air Pressure',    answer: 'Weight of the air pressing down. Measured by a barometer. Rising air = low pressure; sinking = high.' },
  { term: 'Front',           answer: 'The boundary where two air masses with different temperatures meet — triggers lift and storms.' },
  { term: 'Lift',            answer: 'When warm less-dense air is forced upward by cooler denser air pushing underneath it.' },
  { term: 'Instability',     answer: 'The continuous exchange of energy between air masses that powers a storm.' },
  { term: 'Humidity',        answer: 'The amount of water vapor present in the air.' },
  { term: 'Evaporation',     answer: 'Sun heats liquid water, turning it into water vapor and adding humidity to the air.' },
  { term: 'Condensation',    answer: 'Rising warm air cools — water vapor turns into liquid droplets, forming clouds.' },
  { term: 'Precipitation',   answer: 'Water falling from clouds as rain, snow, sleet, or hail.' },
  { term: 'Latitude',        answer: 'Distance north/south of the equator. Closer to equator = more direct sunlight = warmer.' },
  { term: "Earth's Tilt",    answer: "Earth's 23.5° axial tilt causes seasons by changing sunlight intensity and daylight hours." },
  { term: 'Isobar',          answer: 'A map line connecting areas with equal air pressure. Closely spaced = strong winds.' },
  { term: 'Barometer',       answer: 'An instrument that measures air pressure.' },
];

const grid = document.getElementById('cards-grid');
flashcards.forEach(fc => {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `<div class="term">${fc.term}</div><div class="answer">${fc.answer}</div><div class="card-hint">tap to flip</div>`;
  d.onclick = () => {
    if (!d.classList.contains('flipped')) { addFlip(); addPts(1); }
    d.classList.toggle('flipped');
    d.querySelector('.card-hint').textContent = d.classList.contains('flipped') ? 'tap to flip back' : 'tap to flip';
  };
  grid.appendChild(d);
});

// ---- QUIZ ----
const questions = [
  { q: 'What are the three types of heat transfer?',
    opts: ['Radiation, Conduction, Convection','Radiation, Evaporation, Condensation','Conduction, Precipitation, Humidity','Lift, Instability, Front'],
    ans: 0, exp: 'Radiation (sun waves), Conduction (molecule collisions), and Convection (density-driven air movement) are the three methods.' },
  { q: 'Why does warm air rise?',
    opts: ['It is heavier than cold air','It is less dense than cold air','It has higher pressure','It contains more oxygen'],
    ans: 1, exp: 'Warm air is less dense — molecules spread out — so it rises. Cooler denser air sinks and moves in to replace it. This is convection.' },
  { q: 'What instrument measures air pressure?',
    opts: ['Thermometer','Anemometer','Barometer','Hygrometer'],
    ans: 2, exp: 'A barometer measures air pressure. Rising pressure usually signals fair weather; falling pressure often signals a storm approaching.' },
  { q: 'What causes a storm?',
    opts: ['Cold air rising rapidly','Two air masses with different temperatures meeting at a front','High humidity alone','The sun heating the ocean'],
    ans: 1, exp: 'When warm and cold air masses meet at a front, the cold dense air lifts the warm less-dense air. This causes instability, condensation, and precipitation — a storm!' },
  { q: 'What happens to water vapor as warm air rises and cools?',
    opts: ['It evaporates faster','It condenses into droplets forming clouds','It turns to ice immediately','It increases air pressure'],
    ans: 1, exp: 'Condensation: rising warm air cools and water vapor becomes liquid droplets — forming clouds. Enough droplets = precipitation.' },
  { q: 'Why is it warmer near the equator?',
    opts: ['The equator is closer to the sun in space','Sunlight hits more directly and for longer hours','The poles have more cloud cover','The equator has more volcanoes'],
    ans: 1, exp: 'The equator receives sunlight at a direct angle (high intensity) with roughly equal daylight year-round. The poles receive sunlight at a steep angle, spreading energy over a wider area.' },
  { q: 'What causes seasons on Earth?',
    opts: ["Earth moving closer and farther from the sun","Earth's tilt on its axis as it orbits the sun","Changes in the sun's output","Ocean currents shifting"],
    ans: 1, exp: "Earth's 23.5° axial tilt means different hemispheres receive more direct sunlight and longer days at different times of year — creating seasons." },
  { q: 'What does a radar weather map show?',

let curQ = 0;
function buildQuiz() {
  const c = document.getElementById('quiz-container');
  if (curQ >= questions.length) {
    c.innerHTML = `<div class="quiz-box" style="text-align:center;">
      <div class="quiz-q" style="font-size:20px;">⛈ Storm Conquered!</div>
      <p style="font-size:17px;color:#e0d8c4;margin-top:12px;">You scored <strong style="color:#a0d2ff;">${qs}</strong> out of <strong style="color:#a0d2ff;">${qt}</strong>.</p>
      <p style="color:#c8bda8;margin-top:8px;font-size:15px;">You have mastered the weather!</p>
      <button class="next-btn show" style="margin-top:20px;" onclick="curQ=0;qs=0;qt=0;document.getElementById('qs').textContent=0;document.getElementById('qt').textContent=0;buildQuiz();">Try Again →</button>
    </div>`;
    return;
  }
  const q = questions[curQ];
  const opts = q.opts.map((o, i) =>
    `<button class="quiz-opt" onclick="checkQ(${i},${q.ans},'${q.exp.replace(/'/g,"\\'")}',this)">${o}</button>`
  ).join('');
  c.innerHTML = `<div class="quiz-box">
    <div class="quiz-q">Q${curQ+1} of ${questions.length} — ${q.q}</div>
    <div class="quiz-opts">${opts}</div>
    <div class="quiz-feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="nextQ()">Next Question →</button>
  </div>`;
}

function checkQ(sel, ans, exp, btn) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.classList.add('disabled'));
  const correct = (sel === ans);
  btn.classList.add(correct ? 'correct' : 'wrong');
  opts[ans].classList.add('correct');
  const fb = document.getElementById('fb');
  fb.textContent = exp;
  fb.className = 'quiz-feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  document.getElementById('nxt').classList.add('show');
  addQ(correct);
  if (correct) addPts(5);
}

function nextQ() { curQ++; buildQuiz(); }
buildQuiz();

// ---- MATCH ----
const matchPairs = [
  { term: 'Front',        def: 'Boundary where two different air masses meet' },
  { term: 'Convection',   def: 'Heat transfer driven by density — hot air rises, cool air sinks' },
  { term: 'Condensation', def: 'Water vapor cools and becomes liquid droplets, forming clouds' },
  { term: 'Instability',  def: 'Continuous energy exchange that powers a storm' },
  { term: 'Isobar',       def: 'Map line connecting points of equal air pressure' },
  { term: 'Latitude',     def: 'Distance from the equator that determines sunlight intensity' },
  { term: 'Lift',         def: 'Cool dense air forces warm less-dense air upward' },
  { term: 'Evaporation',  def: 'Sun heats water, turning it into vapor in the air' },
];

let selTerm = null, selDef = null, matchCount = 0;

function initMatch() {
  selTerm = null; selDef = null; matchCount = 0;
  document.getElementById('match-score').textContent = `Matched: 0 / ${matchPairs.length}`;
  const sh = [...matchPairs].sort(() => Math.random() - 0.5);
  const sd = [...matchPairs].sort(() => Math.random() - 0.5);
  const tc = document.getElementById('match-terms');
  const dc = document.getElementById('match-defs');
  tc.innerHTML = ''; dc.innerHTML = '';

  sh.forEach(p => {
    const d = document.createElement('div');
    d.className = 'match-item'; d.textContent = p.term; d.dataset.id = p.term;
    d.onclick = () => selectTerm(d);
    tc.appendChild(d);
  });
  sd.forEach(p => {
    const d = document.createElement('div');
    d.className = 'match-item'; d.textContent = p.def; d.dataset.id = p.term;
    d.onclick = () => selectDef(d);
    dc.appendChild(d);
  });
}

function selectTerm(el) {
  if (el.classList.contains('matched')) return;
  document.querySelectorAll('#match-terms .match-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected'); selTerm = el;
  if (selDef) checkMatch();
}

function selectDef(el) {
  if (el.classList.contains('matched')) return;
  document.querySelectorAll('#match-defs .match-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected'); selDef = el;
  if (selTerm) checkMatch();
}

function checkMatch() {
  if (selTerm.dataset.id === selDef.dataset.id) {
    selTerm.classList.add('matched'); selTerm.classList.remove('selected');
    selDef.classList.add('matched');  selDef.classList.remove('selected');
    matchCount++; addPts(3);
    document.getElementById('match-score').textContent = `Matched: ${matchCount} / ${matchPairs.length}`;
    if (matchCount === matchPairs.length)
      setTimeout(() => document.getElementById('match-score').textContent = `⚡ Perfect! All ${matchPairs.length} matched! +${matchPairs.length * 3} points`, 400);
  } else {
    selTerm.classList.add('wrong-match'); selDef.classList.add('wrong-match');
    setTimeout(() => {
      selTerm.classList.remove('wrong-match', 'selected');
      selDef.classList.remove('wrong-match', 'selected');
      selTerm = null; selDef = null;
    }, 500);
    return;
  }
  selTerm = null; selDef = null;
}

initMatch();
